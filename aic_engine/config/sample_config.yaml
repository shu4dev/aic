              translation: -0.02
              roll: 0.0
              pitch: 0.0
              yaw: 0.0
          lc_mount_rail_1:
            entity_present: True
            entity_name: "lc_mount_1"
            entity_pose:
              translation: -0.01
              roll: 0.0
              pitch: 0.0
              yaw: 0.0
          sfp_mount_rail_1:
            entity_present: False
          sc_mount_rail_1:
            entity_present: False
        cable:
          pose:
            gripper_offset:
              x: 0.0
              y: 0.0
              z: 0.0
            roll: 0.5
            pitch: -0.6605
            yaw: 2.6928
          attach_cable_to_gripper: True
          cable_type: "sfp_sc_cable" # [sfp_sc_cable, sfp_sc_cable_reversed]
    tasks:
      task_1:
        cable_type: "sfp_sc"
        cable_name: "cable_0"
        plug_type: "sfp"
        plug_name:  "sfp_plug"
        port_type: "sfp"
