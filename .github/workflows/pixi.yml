name: pixi

on:
  push:
    branches:
      - main
    paths:
          - 'aic_interfaces/**'
          - 'aic_utils/**'
          - '!**/*.md'
  pull_request:
    paths:
          - 'aic_interfaces/**'
          - 'aic_utils/**'
          - '!**/*.md'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  pixi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.2
        with:
          pixi-version: v0.63.2
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true
      # only do isort check as black check is already done by other workflows
      - name: style
        run: |
          isort -c aic_utils/lerobot_robot_aic
      - name: type checks
        run: |
          pyright
